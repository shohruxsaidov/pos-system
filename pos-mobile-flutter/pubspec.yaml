name: pos_mobile_flutter
description: POS Mobile - Flutter clone of pos-mobile warehouse app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management (Pinia equivalent)
  flutter_riverpod: ^3.3.1

  # HTTP client
  http: ^1.2.2

  # Local storage (localStorage / sessionStorage equivalent)
  shared_preferences: ^2.3.3

  # Secure token storage
  flutter_secure_storage: ^10.0.0

  # Network connectivity monitoring
  connectivity_plus: ^7.0.0

  # Navigation
  go_router: ^17.1.0

  # Barcode scanning
  mobile_scanner: ^7.0.0

  # Barcode rendering
  barcode_widget: ^2.0.4

  # Intl for date/number formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1a1a27"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
